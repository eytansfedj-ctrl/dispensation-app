
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Assistant de Dispensation</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
  .header { background: #0F6E56; color: white; padding: 20px; }
  .header h1 { margin: 0; font-size: 18px; }
  .container { padding: 20px; max-width: 800px; margin: auto; }
  .upload-zone { background: white; border: 2px dashed #0F6E56; border-radius: 8px; padding: 30px; text-align: center; margin-bottom: 20px; cursor: pointer; }
  button { background: #0F6E56; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-bottom: 20px; }
  .result { background: white; border-radius: 8px; padding: 20px; white-space: pre-wrap; line-height: 1.6; display: none; }
  .loading { text-align: center; color: #0F6E56; display: none; }
  img#preview { max-width: 100%; border-radius: 8px; margin-bottom: 10px; display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>Assistant de Dispensation Pharmaceutique</h1>
</div>

<div class="container">
  <img id="preview" />
  
  <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
    📷 Cliquez pour uploader ou photographier l'ordonnance
    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" onchange="previewImage(this)">
  </div>

  <button onclick="analyser()">Générer la trame de dispensation</button>
  
  <div class="loading" id="loading">⏳ Claude analyse l'ordonnance...</div>
  
  <div class="result" id="result"></div>
</div>

<script>
const API_KEY = "sk-ant-api03-xpE6NXo64qh21o5qDiRrWRMbAkqxpz4p9mv8LAxFZbPUCJx9zPGUdNHz5

Sp-aMthyEeJbPOPdHUYJQpI-MgBUQ-3X_mLAAA

";

function previewImage(input) {
  if (input.files && input.files[0]) {
    var reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('preview').src = e.target.result;
      document.getElementById('preview').style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

async function analyser() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) { alert('Veuillez uploader une ordonnance'); return; }
  
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  
  const reader = new FileReader();
  reader.onload = async function(e) {
    const base64 = e.target.result.split(',')[1];
    const mediaType = file.type || 'image/jpeg';
    
    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1500,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'image',
                source: { type: 'base64', media_type: mediaType, data: base64 }
              },
              {
                type: 'text',
                text: "Tu es un assistant pharmaceutique expert. Lis cette ordonnance, extrais les médicaments et génère une trame de conseil officinal pour chaque médicament : moment de prise, points critiques à dire au patient, interactions à surveiller, produits associés recommandés. Réponds en français de façon structurée."
              }
            ]
          }]
        })
      });
      
      const data = await response.json();
      const texte = data.content[0].text;
      
      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      document.getElementById('result').innerText = texte;
      
    } catch(err) {
      document.getElementById('loading').style.display = 'none';
      alert('Erreur : ' + err.message);
    }
  };
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
